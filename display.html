<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Score Board Display</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

body {
  position: relative;
}

/* 1920x1080の固定ステージを自動拡大縮小 */
#stage {
  position: absolute;
  left: 0;
  top: 0;
  width: 1920px;
  height: 1080px;
  transform-origin: top left;
  overflow: hidden;
  background: black;
}

/* 表示エリア */
.container {
  display: flex;
  width: 1920px;
  height: 980px; /* 下のロゴ帯100pxを除いた高さ */
}

.team {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

/* 背景 */
.left {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.08) 0px,
      rgba(255,255,255,0.08) 2px,
      transparent 2px,
      transparent 12px
    ),
    linear-gradient(135deg, #ff3b3b, #a00000);
}

.right {
  background:
    repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.08) 0px,
      rgba(255,255,255,0.08) 2px,
      transparent 2px,
      transparent 12px
    ),
    linear-gradient(135deg, #2a6fff, #001f3f);
}

/* チーム名 */
.team-name {
  color: white;
  font-weight: 900;
  text-align: center;
  width: 78%;
  height: 150px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family:
    "Hiragino Sans",
    "Noto Sans JP",
    "Yu Gothic",
    sans-serif;
  -webkit-text-stroke: 1px rgba(0,0,0,0.35);
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
  line-height: 1.08;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: anywhere;
  padding: 0 10px;
}

/* スコア */
.score-box {
  background: white;
  width: 220px;
  height: 180px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 120px;
  font-family: Impact, "Arial Black", sans-serif;
  letter-spacing: 4px;
  line-height: 1;
}

/* サーブ */
.serve-row {
  display: flex;
  gap: 10px;
  min-height: 56px;
  align-items: center;
}

.dot {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 3px solid #ccc;
  box-sizing: border-box;
}

.fill {
  background: black;
  border-color: black;
}

/* 中央 */
.center {
  position: absolute;
  left: 50%;
  top: 45%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  color: white;
  font-family: Impact, "Arial Black", sans-serif;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  pointer-events: none;
  z-index: 5;
}

/* コート */
.court {
  position: absolute;
  bottom: 120px;
  width: 100%;
  text-align: center;
  font-size: 80px;
  color: white;
  font-family: Impact, "Arial Black", sans-serif;
  text-shadow: 0 2px 10px rgba(0,0,0,0.35);
  pointer-events: none;
  z-index: 5;
}

/* ロゴ帯 */
.logo-bar {
  position: absolute;
  bottom: 0;
  width: 1920px;
  height: 100px;
  background: white;
  display: flex;
  justify-content: center;
  gap: 120px;
  align-items: center;
  z-index: 5;
}

.logo-small { height: 50px; }
.logo-big { height: 80px; }
</style>
</head>

<body>

<div id="stage">
  <div class="container">
    <div class="team left">
      <div class="team-name" id="nameA">TEAM A</div>
      <div class="score-box" id="scoreA">00</div>
      <div class="serve-row" id="serveA"></div>
    </div>

    <div class="team right">
      <div class="team-name" id="nameB">TEAM B</div>
      <div class="score-box" id="scoreB">00</div>
      <div class="serve-row" id="serveB"></div>
    </div>
  </div>

  <div class="center">VS</div>
  <div class="court" id="courtLabel">Court A</div>

  <div class="logo-bar">
    <img src="logo1.png" class="logo-small">
    <img src="logo2.png" class="logo-small">
    <img src="logo3.png" class="logo-big">
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAJGr2rIZFr3m7Olh54Ko3nLfmGMEPBxCM",
  projectId: "pickleball-score-95fc1"
});

const db = getFirestore(app);

/* ▼ ここをコートごとに変える
   courtA / courtB / courtC / courtD */
const currentCourt = "courtA";

let scoreA = 0;
let scoreB = 0;
let serverTeam = "A";
let serverTurn = 1;
let teamA = "TEAM A";
let teamB = "TEAM B";

function format(n) {
  return n.toString().padStart(2, "0");
}

function courtToLabel(courtId) {
  return courtId.replace("court", "Court ");
}

function fitStage() {
  const baseW = 1920;
  const baseH = 1080;
  const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);

  const stage = document.getElementById("stage");
  const offsetX = (window.innerWidth - baseW * scale) / 2;
  const offsetY = (window.innerHeight - baseH * scale) / 2;

  stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}

/* 左右独立で文字サイズ調整 */
function fitTeamName(el, max = 60, min = 24) {
  el.style.fontSize = max + "px";
  el.style.whiteSpace = "nowrap";

  if (el.scrollWidth <= el.clientWidth) {
    return;
  }

  el.style.whiteSpace = "normal";

  let size = max;
  while ((el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth) && size > min) {
    size -= 2;
    el.style.fontSize = size + "px";
  }
}

function render() {
  document.getElementById("scoreA").innerText = format(scoreA);
  document.getElementById("scoreB").innerText = format(scoreB);

  const elA = document.getElementById("nameA");
  const elB = document.getElementById("nameB");

  elA.innerText = teamA || "TEAM A";
  elB.innerText = teamB || "TEAM B";

  fitTeamName(elA);
  fitTeamName(elB);

  document.getElementById("serveA").innerHTML =
    `<div class="dot ${serverTeam === "A" && serverTurn === 1 ? "fill" : ""}"></div>
     <div class="dot ${serverTeam === "A" && serverTurn === 2 ? "fill" : ""}"></div>`;

  document.getElementById("serveB").innerHTML =
    `<div class="dot ${serverTeam === "B" && serverTurn === 1 ? "fill" : ""}"></div>
     <div class="dot ${serverTeam === "B" && serverTurn === 2 ? "fill" : ""}"></div>`;

  document.getElementById("courtLabel").innerText = courtToLabel(currentCourt);
}

onSnapshot(doc(db, "courts", currentCourt), (snap) => {
  if (!snap.exists()) {
    render();
    return;
  }

  const d = snap.data();

  scoreA = d.scoreA || 0;
  scoreB = d.scoreB || 0;
  serverTeam = d.serverTeam || "A";
  serverTurn = d.serverTurn || 1;
  teamA = d.teamA || "TEAM A";
  teamB = d.teamB || "TEAM B";

  render();
});

window.addEventListener("resize", fitStage);
window.addEventListener("load", fitStage);

fitStage();
render();
</script>

</body>
</html>
